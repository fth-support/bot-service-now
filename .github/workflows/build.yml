name: Build ServiceNow Bot EXE

on:
  push:
    paths:
      - 'README.md'
      - 'bot_script.py'
      - '.github/workflows/build.yml' # เพิ่มบรรทัดนี้ เพื่อให้รันตอนแก้ไฟล์นี้ด้วยเลย

jobs:
  build-windows:
    runs-on: windows-latest 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # <--- เปลี่ยนเป็น v4 ตรงนี้

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile bot_script.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4 # <--- เปลี่ยนเป็น v4 ตรงนี้
      with:
        name: ServiceNow-Bot-App
        path: dist/bot_script.exe
