name: Build ServiceNow Bot EXE

on:
  push:
    paths:
      - 'README.md'
      - 'bot_script.py'
      - '.github/workflows/build.yml'

jobs:
  build-windows:
    runs-on: windows-latest 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium pyinstaller pyrebase4

    # เพิ่มคำสั่ง --collect-all selenium เพื่อบังคับให้ดึงไฟล์มาให้ครบ
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --collect-all selenium bot_script.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ServiceNow-Bot-App
        path: dist/bot_script.exe
