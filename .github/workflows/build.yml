name: Build ServiceNow Bot EXE

on:
  push:
    paths:
      - 'README.md'
      - 'bot_script.py'
      - '.github/workflows/build.yml'

jobs:
  build-windows:
    runs-on: windows-latest 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 💡 จุดสำคัญ: บังคับลง urllib3 เวอร์ชั่น 1.26.15 เพื่อแก้บั๊ก appengine
        pip install selenium pyinstaller pyrebase4 requests urllib3==1.26.15

    - name: Build EXE with PyInstaller
      run: |
        # 💡 เพิ่ม --collect-all pyrebase และ --hidden-import เพื่อความชัวร์
        pyinstaller --onefile `
        --collect-all selenium `
        --collect-all pyrebase `
        --collect-all requests `
        --collect-all urllib3 `
        --hidden-import=requests `
        --hidden-import=urllib3 `
        bot_script.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ServiceNow-Bot-App
        path: dist/bot_script.exe
