name: Build ServiceNow Bot EXE

on:
  push:
    paths:
      - 'bot_script.py'
      - '.github/workflows/build.yml'

jobs:
  build-windows:
    runs-on: windows-latest 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium pyinstaller firebase-admin

    - name: Build EXE with PyInstaller
      run: |
        # รวบรวม module ที่จำเป็นทั้งหมดสำหรับ Firestore และ Selenium เข้าในไฟล์เดียว
        pyinstaller --onefile `
        --collect-all selenium `
        --collect-all firebase_admin `
        --collect-all google.cloud.firestore `
        bot_script.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ServiceNow-Bot-UAT
        path: dist/bot_script.exe
