name: Build ServiceNow Bot EXE

# 1. กำหนดเงื่อนไขให้รันเมื่อมีการแก้ไขโค้ดหรือไฟล์ตั้งค่า
on:
  push:
    paths:
      - 'README.md'
      - 'bot_script.py'
      - '.github/workflows/build.yml'

jobs:
  build-windows:
    # 2. ใช้ Windows Server ในการ Build เพื่อให้ได้ไฟล์ .exe
    runs-on: windows-latest 

    steps:
    # 3. ดึงโค้ดเวอร์ชันล่าสุด
    - name: Checkout code
      uses: actions/checkout@v4

    # 4. ติดตั้ง Python 3.10
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 5. ติดตั้ง Library ทั้งหมดที่บอทเราต้องใช้
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium pyinstaller pyrebase4

    # 6. ใช้ PyInstaller แปลงเป็น .exe
    # เพิ่ม --collect-all สำหรับ selenium, requests และ urllib3 เพื่อป้องกัน Error โมดูลหาย
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --collect-all selenium --collect-all requests --collect-all urllib3 bot_script.py

    # 7. อัปโหลดไฟล์ .exe ขึ้นระบบ (Artifacts)
    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ServiceNow-Bot-App
        path: dist/bot_script.exe
